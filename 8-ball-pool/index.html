<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Ball Pool Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎱 8 Ball Pool</h1>
            <div class="stats">
                <div class="stat-item">
                    <span class="label">Player:</span>
                    <span class="value" id="playerType">-</span>
                </div>
                <div class="stat-item">
                    <span class="label">Balls Pocketed:</span>
                    <span class="value" id="ballsPocketed">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Shots:</span>
                    <span class="value" id="shotCount">0</span>
                </div>
            </div>
        </div>

        <div class="game-area">
            <canvas id="poolTable" width="1000" height="600"></canvas>
            <div class="controls">
                <button id="newGameBtn" class="btn btn-primary">New Game</button>
                <button id="resetBtn" class="btn btn-secondary">Reset Table</button>
            </div>
        </div>

        <div class="instructions">
            <h3>How to Play:</h3>
            <ul>
                <li><strong>Click on cue ball</strong> to select it</li>
                <li><strong>Drag backward</strong> to aim and set power</li>
                <li><strong>Release</strong> to shoot</li>
                <li><strong>Solids vs Stripes:</strong> Pocket your balls first, then the 8 ball to win</li>
                <li><strong>Scratch:</strong> Cue ball in pocket = turn over</li>
            </ul>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
