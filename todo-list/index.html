<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-tasks"></i> My Tasks</h1>
                <p class="date" id="currentDate"></p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Add Todo Section -->
            <section class="add-todo-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="btn-add">
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-list"></i> All
                    </button>
                    <button class="filter-btn" data-filter="active">
                        <i class="fas fa-circle-notch"></i> Active
                    </button>
                    <button class="filter-btn" data-filter="completed">
                        <i class="fas fa-check-circle"></i> Completed
                    </button>
                </div>
            </section>

            <!-- Stats Section -->
            <section class="stats-section">
                <div class="stat-card">
                    <i class="fas fa-list-check"></i>
                    <div>
                        <p class="stat-label">Total Tasks</p>
                        <p class="stat-value" id="totalTasks">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-hourglass-half"></i>
                    <div>
                        <p class="stat-label">Active Tasks</p>
                        <p class="stat-value" id="activeTasks">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check"></i>
                    <div>
                        <p class="stat-label">Completed</p>
                        <p class="stat-value" id="completedTasks">0</p>
                    </div>
                </div>
            </section>

            <!-- Todo List Section -->
            <section class="todos-section">
                <div class="todos-header">
                    <h2>Your Tasks</h2>
                    <button id="clearCompletedBtn" class="btn-clear-completed" style="display: none;">
                        <i class="fas fa-trash"></i> Clear Completed
                    </button>
                </div>

                <!-- Todos Container -->
                <div id="todoList" class="todo-list">
                    <!-- Todos will be inserted here -->
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>No tasks yet</p>
                    <p class="empty-state-sub">Add a task to get started!</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <p>Your tasks are automatically saved to your browser</p>
                <div class="footer-actions">
                    <button id="exportBtn" class="btn-footer" title="Export tasks">
                        <i class="fas fa-download"></i> Export
                    </button>
                    <button id="settingsBtn" class="btn-footer" title="Settings">
                        <i class="fas fa-cog"></i> Settings
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <!-- Modal for Settings -->
    <div id="settingsModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="btn-close" id="closeSettingsBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label class="checkbox-label">
                        <input type="checkbox" id="darkModeToggle" class="checkbox-input">
                        <span>Dark Mode</span>
                    </label>
                </div>
                <div class="setting-item">
                    <label class="checkbox-label">
                        <input type="checkbox" id="notificationsToggle" class="checkbox-input" checked>
                        <span>Enable Notifications</span>
                    </label>
                </div>
                <div class="setting-item">
                    <button id="resetBtn" class="btn-reset">
                        <i class="fas fa-redo"></i> Reset All Tasks
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
